name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: flume-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            name: flume-x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: flume-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: flume-aarch64-unknown-linux-gnu
            use_cross: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Detect Python and build
        run: |
          FEATURES=""
          # Skip Python when cross-compiling (PyO3 needs target Python headers)
          if [ "${{ matrix.use_cross }}" != "true" ]; then
            if python3 -c "import sysconfig; print(sysconfig.get_path('include'))" 2>/dev/null; then
              echo "Python detected, enabling python feature"
              FEATURES="--features python"
            fi
          fi
          BUILD_CMD="cargo"
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            BUILD_CMD="cross"
          fi
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 $BUILD_CMD build --release --target ${{ matrix.target }} -p flume-tui $FEATURES

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz flume
          cd ../../..
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256

  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build .deb
        run: |
          chmod +x packaging/deb/build-deb.sh
          bash packaging/deb/build-deb.sh
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: flume-deb
          path: target/*.deb

  release:
    needs: [build, deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
            artifacts/**/*.deb
