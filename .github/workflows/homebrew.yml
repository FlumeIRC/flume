name: Publish Homebrew

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Calculate source tarball SHA256
        id: sha
        run: |
          curl -sL "https://github.com/FlumeIRC/flume/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" -o source.tar.gz
          SHA=$(shasum -a 256 source.tar.gz | awk '{print $1}')
          echo "sha256=${SHA}" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const sha = '${{ steps.sha.outputs.sha256 }}';
            const tag = '${{ github.ref_name }}';

            // Read the formula template from this repo
            const fs = require('fs');
            let content = fs.readFileSync('packaging/homebrew/flume.rb', 'utf8');

            // Patch URL and SHA
            content = content.replace(
              /url ".*"/,
              `url "https://github.com/FlumeIRC/flume/archive/refs/tags/${tag}.tar.gz"`
            );
            content = content.replace(
              /sha256 ".*"/,
              `sha256 "${sha}"`
            );

            // Check if formula already exists in tap
            let existingSha;
            try {
              const { data: existing } = await github.rest.repos.getContent({
                owner: 'FlumeIRC',
                repo: 'homebrew-tap',
                path: 'Formula/flume.rb',
                ref: 'main'
              });
              existingSha = existing.sha;
            } catch (e) {
              existingSha = undefined;
            }

            // Create or update the formula
            await github.rest.repos.createOrUpdateFileContents({
              owner: 'FlumeIRC',
              repo: 'homebrew-tap',
              path: 'Formula/flume.rb',
              message: `Update flume to ${version}`,
              content: Buffer.from(content).toString('base64'),
              sha: existingSha,
              branch: 'main'
            });

            console.log(`Updated homebrew-tap formula to ${version} (sha: ${sha})`);
